    <script>
      // 指数配置 - 分组

      // 策略1：十日线拐头策略 适用的指数

        { symbol: 'sh000001', name: '上证指数' },

      // 策略3：二十日线拐头策略 适用的指数

        { symbol: 'sz159941', name: '纳指' },
      ]

      // 策略4：二十日线价格站上策略 适用的指数
      const INDICES_STRATEGY4 = [
        { symbol: 'sh513310', name: '中韩半导体' },
        { symbol: 'sh513160', name: '港科技30' },
        { symbol: 'sh513120', name: '创新药' },

      // 策略5：五日线站上买入，跌破卖出策略 适用的指数
      const INDICES_STRATEGY5 = [{ symbol: 'sh518680', name: '金' }]

      // 策略6：恐贪策略 适用的指数
      const INDICES_STRATEGY6 = [{ symbol: 'sh510880', name: '红利' }]

      // 策略 7：五日线拐头买入，拐头向下卖出 适用的指数
      const INDICES_STRATEGY7 = []

      const STRATEGY_PARAMS = {
        INITIAL_CASH: 100000,
        START_DATE: '2024-01-01', // 与multiGreed.js保持一致，确保恐贪指数计算同步
        TRADE_START_DATE: '2025-12-31', // 实际交易开始日期

      }

      // 初始化通知服务配置
      NotificationService.setConfig({
        strategyName: '日K交易策略',
        // 1. 企业微信机器人 (推荐，无需下载app，直接在微信接收)
        wecomBotWebhooks: [],

        // 2. WxPusher (需要下载app)
        wxPusherTokens: ['AT_dMjPttrnlSqU9uKlpW7oxkGzVynM2RkD'],

        // 3. Server酱 (作为备用)
        serverChanKeys: ['SCT334617TKxy33cDYaBCSuwDLJVacG29w', 'SCT334636TTbtgSXxI8pnd1tDM2nwEJIHk'],
      })

      // 获取实时数据并转换为日线数据
      async function fetchMinuteData(symbol) {
        try {
          const url = `https://qt.gtimg.cn/q=${symbol}`
          console.log(`正在获取实时数据: ${url}`)

          const response = await fetch(url)
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`)
          }

          const raw = await response.text()

          console.log(`实时数据原始响应:`, raw)

          // 解析腾讯财经返回的数据格式
          const match = raw.match(/"([^"]+)"/)
          if (!match) {
            throw new Error('无法解析实时数据')
          }

          const data = match[1].split('~')
          console.log(`实时数据解析结果:`, data)
          console.log(`实时数据长度: ${data.length}`)

          // 提取今天的日期（使用当前系统日期）
          const today = new Date().toISOString().split('T')[0]

          // 从实时数据中提取OHLCV数据，增加容错处理
          let open = 0,
            high = 0,
            low = 0,
            close = 0,
            volume = 0

          if (data.length >= 4) {
            close = parseFloat(data[3]) || 0 // 当前价（作为收盘价）
          }
          if (data.length >= 6) {
            open = parseFloat(data[5]) || close // 开盘价
          }
          if (data.length >= 33) {
            high = parseFloat(data[32]) || close // 最高价
          }
          if (data.length >= 34) {
            low = parseFloat(data[33]) || close // 最低价
          }
          if (data.length >= 7) {
            volume = parseFloat(data[6]) || 0 // 成交量
          }

          // 如果没有获取到最高价和最低价，使用当前价作为默认值
          high = high || close
          low = low || close

          // 如果所有价格都为0，说明数据有问题
          if (close === 0) {
            throw new Error('实时数据价格为0，数据无效')
          }

          console.log(`✓ 实时数据转换完成: 开盘${open} 最高${high} 最低${low} 收盘${close} 成交量${volume}`)

          return {
            date: today,
            open: open,
            high: high,
            low: low,
            price: close,
            volume: volume,
          }
        } catch (error) {
          console.error(`获取${symbol}实时数据失败:`, error)
          return null
        }
      }

      // 获取前一个交易日
      function getPreviousTradingDay(date) {
        const d = new Date(date)
        d.setDate(d.getDate() - 1)

        // 跳过周末
        while (d.getDay() === 0 || d.getDay() === 6) {
          d.setDate(d.getDate() - 1)
        }

        return d.toISOString().split('T')[0]
      }

      // 数据获取函数
      async function fetchDailyData(symbol) {
        try {
          // 使用腾讯财经API获取日线数据
          const startDate = STRATEGY_PARAMS.START_DATE
          const today = new Date().toISOString().split('T')[0]
          const endDate = getPreviousTradingDay(today) // 直接使用今天作为结束日期，获取最新数据
          const limit = 2000 // 与multiGreed.js保持一致

          const url = `https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?_var=kline_dayqfq&param=${symbol},day,${startDate},${endDate},${limit},qfq`
          console.log(`正在获取历史数据: ${url}`)
          console.log(`数据范围: ${startDate} → ${endDate}`)

          const response = await fetch(url)

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`)
          }

          const raw = await response.text()
          // 处理JSONP格式
          const json = JSON.parse(raw.replace(/^kline_dayqfq=/, ''))

          const stockData = json?.data?.[symbol]
          const klines = stockData?.qfqday || stockData?.day

          if (!klines || klines.length === 0) {
            throw new Error(`未获取到K线数据: ${symbol}`)
          }

          const formattedData = klines.map((arr) => ({
            date: arr[0],
            price: parseFloat(arr[2]), // 收盘价
            open: parseFloat(arr[1]),
            high: parseFloat(arr[3]),
            low: parseFloat(arr[4]),
            volume: parseFloat(arr[5]),
          }))

          // 按日期排序，确保数据是从旧到新的顺序
          formattedData.sort((a, b) => (a.date > b.date ? 1 : -1))

          // 获取当天的实时数据并转换为日线数据
          const todayData = await fetchMinuteData(symbol)
          if (todayData) {
            formattedData.push(todayData)
            console.log(`✓ 已添加${today}的实时数据`)
          }

          console.log(
            `✓ 数据获取成功：${formattedData.length}条 (${formattedData[0].date} → ${formattedData[formattedData.length - 1].date})`,
          )
          return formattedData
        } catch (error) {
          console.error(`获取${symbol}日线数据失败:`, error)
          // 提供模拟数据，以便在本地测试时也能看到效果
          return generateMockData(symbol)
        }
      }

      // 生成模拟数据，用于本地测试
      function generateMockData(symbol) {
        const mockData = []
        const startDate = new Date(STRATEGY_PARAMS.START_DATE)
        const now = new Date()
        let basePrice = symbol === 'sh000001' ? 3800 : 4600

        for (let d = new Date(startDate); d <= now; d.setDate(d.getDate() + 1)) {
          // 跳过周末
          if (d.getDay() === 0 || d.getDay() === 6) continue

          // 生成随机价格波动
          const change = (Math.random() - 0.5) * 2
          basePrice += basePrice * (change / 100)
          mockData.push({
            date: d.toISOString().split('T')[0],
            price: parseFloat(basePrice.toFixed(2)),
            open: parseFloat((basePrice * (1 + ((Math.random() - 0.5) * 0.5) / 100)).toFixed(2)),
            high: parseFloat((basePrice * (1 + (Math.random() * 0.5) / 100)).toFixed(2)),
            low: parseFloat((basePrice * (1 - (Math.random() * 0.5) / 100)).toFixed(2)),
            volume: parseFloat((Math.random() * 10000000000).toFixed(2)),
          })
        }

        return mockData
      }

      // 计算移动平均线
      function calculateMA(data, period) {
        const maData = []
        for (let i = period - 1; i < data.length; i++) {
          const sum = data.slice(i - period + 1, i + 1).reduce((acc, item) => acc + item.price, 0)
          maData.push(sum / period)
        }
        return maData
      }

      // 工具函数：计算SMA
      function calcSMA(arr, period) {
        return arr.map((_, i) => {
          if (i < period - 1) return null
          let sum = 0
          for (let k = i - period + 1; k <= i; k++) sum += arr[k]
          return sum / period
        })
      }

      // 工具函数：计算RSI
      function calcRSI(closes, period = 14) {
        const rsi = new Array(closes.length).fill(null)
        if (closes.length < period + 1) return rsi

        let gainSum = 0,
          lossSum = 0
        for (let i = 1; i <= period; i++) {
          const diff = closes[i] - closes[i - 1]
          if (diff > 0) gainSum += diff
          else lossSum += Math.abs(diff)
        }

        let avgGain = gainSum / period
        let avgLoss = lossSum / period
        rsi[period] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss)

        for (let i = period + 1; i < closes.length; i++) {
          const diff = closes[i] - closes[i - 1]
          const gain = diff > 0 ? diff : 0
          const loss = diff < 0 ? Math.abs(diff) : 0
          avgGain = (avgGain * (period - 1) + gain) / period
          avgLoss = (avgLoss * (period - 1) + loss) / period
          rsi[i] = avgLoss === 0 ? 100 : 100 - 100 / (1 + avgGain / avgLoss)
        }
        return rsi
      }

      // 工具函数：历史百分位排名
      function percentileRank(validArr, value) {
        if (validArr.length === 0) return 50
        const below = validArr.filter((v) => v <= value).length
        return (below / validArr.length) * 100
      }

      // 完整版5指标恐贪指数（与fearGreed.js完全一致）
      function calculateFearGreed(data) {
        const closes = data.map((d) => d.price || d.close)
        const volumes = data.map((d) => d.volume || 0)
        const n = closes.length

        // 日收益率序列
        const returns = closes.map((c, i) => (i === 0 ? null : (c - closes[i - 1]) / closes[i - 1]))

        // 指标1：价格动能 (close - MA60) / MA60
        const ma60 = calcSMA(closes, 60)
        const momentum = closes.map((c, i) => (ma60[i] == null ? null : (c - ma60[i]) / ma60[i]))

        // 指标2：20日历史波动率（收益率标准差）
        const volatility = closes.map((_, i) => {
          if (i < 20) return null
          const slice = returns.slice(i - 19, i + 1).filter((v) => v !== null)
          if (slice.length < 10) return null
          const mean = slice.reduce((a, b) => a + b, 0) / slice.length
          const variance = slice.reduce((a, b) => a + (b - mean) ** 2, 0) / slice.length
          return Math.sqrt(variance)
        })

        // 指标3：RSI(14)
        const rsi14 = calcRSI(closes, 14)

        // 指标4：方向成交量 = 量比 × 涨跌方向
        const ma20vol = calcSMA(volumes, 20)
        const volMomentum = volumes.map((v, i) => {
          if (ma20vol[i] == null || i === 0 || returns[i] == null) return null
          const volRatio = v / ma20vol[i]
          const dir = returns[i] >= 0 ? 1 : -1
          return volRatio * dir
        })

        // 指标5：价格位置——在过去120日高低区间的相对位置
        const pricePosition = closes.map((c, i) => {
          if (i < 119) return null
          const slice = closes.slice(i - 119, i + 1)
          const hi = Math.max(...slice)
          const lo = Math.min(...slice)
          if (hi === lo) return 50
          const position = ((c - lo) / (hi - lo)) * 100
          return position
        })

        // 预提取各指标的全局有效值数组
        const valMomentum = momentum.filter((v) => v !== null)
        const valVolatility = volatility.filter((v) => v !== null)
        const valRSI = rsi14.filter((v) => v !== null)
        const valVolMomentum = volMomentum.filter((v) => v !== null)

        // 逐日合成恐贪值
        const scores = closes.map((_, i) => {
          if (
            momentum[i] == null ||
            volatility[i] == null ||
            rsi14[i] == null ||
            volMomentum[i] == null ||
            pricePosition[i] == null
          )
            return null

          if (
            valMomentum.length === 0 ||
            valVolatility.length === 0 ||
            valRSI.length === 0 ||
            valVolMomentum.length === 0
          ) {
            return null
          }

          const s1 = percentileRank(valMomentum, momentum[i]) // 价格动能
          const s2 = 100 - percentileRank(valVolatility, volatility[i]) // 波动率（反向）
          const s3 = percentileRank(valRSI, rsi14[i]) // RSI
          const s4 = percentileRank(valVolMomentum, volMomentum[i]) // 方向成交量
          const s5 = pricePosition[i] // 价格位置

          return +((s1 + s2 + s3 + s4 + s5) / 5).toFixed(1)
        })

        return scores
      }

      // 记录上一次通知的信号类型，按指数存储
      const lastNotificationType = {}

      // 收集所有通知消息
      let notificationMessages = []

      // 微信通知函数
      function sendWeChatNotification(message, signalType, indexSymbol) {
        try {
          // 检查信号类型是否变化
          if (lastNotificationType[indexSymbol] === signalType) {
            console.log(`信号类型未变化，跳过通知: ${signalType} for ${indexSymbol}`)
            return
          }

          // 收集消息
          notificationMessages.push(message)

        } catch (error) {

      // 发送所有收集的通知
      function sendAllNotifications() {
        if (notificationMessages.length === 0) {
          console.log('没有新的通知需要发送')
          return
        }

        // 合并所有消息
        const combinedMessage = notificationMessages.join('\n\n')

        // === 通知服务配置 ===
        // 1. WxPusher (推荐，免费额度更高)
        const wxPusherTokens = ['AT_dMjPttrnlSqU9uKlpW7oxkGzVynM2RkD'] // 在这里添加WxPusher的Token

        // 发送WxPusher通知
        if (wxPusherTokens.length > 0) {
          wxPusherTokens.forEach((token, index) => {
            if (token) {
              const url = 'https://wxpusher.zjiecode.com/api/send/message'
              const data = {
                appToken: token,
                content: `## 日K交易策略交易通知\n\n${combinedMessage}`,
                contentType: 3, // 3表示Markdown格式
                uids: ['UID_fG02ooNJzDTHmyv4Lhh0JFAPPBC4', 'UID_MB31nZrc9wG0D9baIFdQuZshiRLU'], // 需要填写用户的UID，可以在WxPusher后台查看
                topicIds: [], // 也可以通过topicId发送
              }

              fetch(url, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify(data),
              })

      function backtestStrategy5(data, index) {
        const strategyName = '策略5-五日线站上策略'
        const ma5 = calculateMA(data, 5)
        let cash = STRATEGY_PARAMS.INITIAL_CASH
        let shares = 0
        let trades = []
        let positionHistory = []
        let lastBuyPrice = 0 // 记录上次买入价格

        for (let i = 0; i < ma5.length; i++) {
          const currentDate = data[i + 4].date
          const currentPrice = data[i + 4].price // 因为ma5从第5个数据开始
          const currentMA = ma5[i]

          // 只在交易开始日期之后进行交易
          if (currentDate < STRATEGY_PARAMS.TRADE_START_DATE) {
            // 记录持仓历史
            positionHistory.push({
              date: currentDate,
              price: currentPrice,
              cash: cash,
              shares: shares,
              totalValue: cash + shares * currentPrice,
            })
            continue
          }

          // 价格站上五日线
          if (currentPrice > currentMA && shares === 0) {
            // 买入
            const buyShares = Math.floor(cash / currentPrice)
            const cost = buyShares * currentPrice * (1 + STRATEGY_PARAMS.TRANSACTION_COST)
            cash -= cost
            shares = buyShares
            lastBuyPrice = currentPrice // 记录买入价格
            const buyDate = currentDate
            trades.push({ type: 'buy', date: buyDate, price: currentPrice, shares: buyShares, cash })
          }
          // 价格跌破五日线
          else if (currentPrice < currentMA && shares > 0) {
            // 卖出
            const sellValue = shares * currentPrice * (1 - STRATEGY_PARAMS.TRANSACTION_COST)
            const returnRate = (currentPrice - lastBuyPrice) / lastBuyPrice
            cash += sellValue
            const sellDate = currentDate
            trades.push({
              type: 'sell',
              date: sellDate,
              price: currentPrice,
              shares: shares,
              cash,
              returnRate: returnRate,
            })
            shares = 0
            lastBuyPrice = 0
          }

          // 记录持仓历史
          positionHistory.push({
            date: currentDate,
            price: currentPrice,
            cash: cash,
            shares: shares,
            totalValue: cash + shares * currentPrice,
          })
        }

        // 计算结果
        const finalValue = cash + shares * (data[data.length - 1]?.price || 0)
        const returnRate = (finalValue - STRATEGY_PARAMS.INITIAL_CASH) / STRATEGY_PARAMS.INITIAL_CASH

        // 计算胜率
        let winCount = 0
        for (let i = 1; i < trades.length; i += 2) {
          const buyTrade = trades[i - 1]
          const sellTrade = trades[i]
          if (sellTrade.price > buyTrade.price) {
            winCount++
          }
        }
        const winRate = trades.length >= 2 ? winCount / (trades.length / 2) : 0

        // 计算最大回撤
        let maxDrawdown = 0
        let peakValue = STRATEGY_PARAMS.INITIAL_CASH
        for (const position of positionHistory) {
          const currentValue = position.totalValue
          if (currentValue > peakValue) {
            peakValue = currentValue
          }
          const drawdown = (peakValue - currentValue) / peakValue
          if (drawdown > maxDrawdown) {
            maxDrawdown = drawdown
          }
        }

        // 检查最后一次交易并发送通知
        if (trades.length > 0) {
          const lastTrade = trades[trades.length - 1]
          if (lastTrade.type === 'buy') {
            // 发送微信通知
            NotificationService.addNotification(
              `${index.name}(${index.symbol}) 买入信号\n策略类型：${strategyName}\n日期：${lastTrade.date}\n价格：¥${lastTrade.price.toFixed(2)}\n买入数量：${lastTrade.shares}股\n剩余资金：¥${lastTrade.cash.toFixed(2)}`,
              'buy',
              index.symbol,
            )
          } else if (lastTrade.type === 'sell') {
            // 发送微信通知
            NotificationService.addNotification(
              `${index.name}(${index.symbol}) 卖出信号\n策略类型：${strategyName}\n日期：${lastTrade.date}\n价格：¥${lastTrade.price.toFixed(2)}\n卖出数量：${lastTrade.shares}股\n总资金：¥${lastTrade.cash.toFixed(2)}`,
              'sell',
              index.symbol,
            )
          }
        }

        return {
          name: '',
          initialCash: STRATEGY_PARAMS.INITIAL_CASH,
          finalValue: finalValue,
          returnRate: returnRate,
          trades: trades,
          winRate: winRate,
          maxDrawdown: maxDrawdown,
          positionHistory: positionHistory,
        }
      }

      // 策略6：恐贪策略（红利专用）
      function backtestStrategy6(data, index) {
        const strategyName = '策略6-恐贪策略'
        const fearGreed = calculateFearGreed(data)
        let cash = STRATEGY_PARAMS.INITIAL_CASH
        let shares = 0
        let trades = []
        let positionHistory = []
        let lastBuyPrice = 0 // 记录上次买入价格

        const BUY_THRESHOLD = 30
        const SELL_THRESHOLD = 75 // 红利指数卖出阈值为75
        const MIN_INTERVAL = 20

        let lastBuyIdx = -MIN_INTERVAL
        let lastSellIdx = -MIN_INTERVAL

        // 从第二天开始遍历，需要与前一日比较
        for (let i = 1; i < fearGreed.length; i++) {
          const currentDate = data[i].date
          const currentPrice = data[i].price || data[i].close
          const currentFG = fearGreed[i]

          // 跳过恐贪值未计算的时期
          if (currentFG === null) {
            positionHistory.push({
              date: currentDate,
              price: currentPrice,
              cash: cash,
              shares: shares,
              totalValue: cash + shares * currentPrice,
            })
            continue
          }

          if (currentDate < STRATEGY_PARAMS.TRADE_START_DATE) {
            positionHistory.push({
              date: currentDate,
              price: currentPrice,
              cash: cash,
              shares: shares,
              totalValue: cash + shares * currentPrice,
            })
            continue
          }

          // 获取前一日的恐贪值
          const prevFG = i > 0 ? fearGreed[i - 1] : currentFG

          // 买入信号：从前一日 >=30 变为当日 <30（进入恐慌区）
          if (prevFG >= BUY_THRESHOLD && currentFG < BUY_THRESHOLD && shares === 0) {
            const buyShares = Math.floor(cash / currentPrice)
            const cost = buyShares * currentPrice * (1 + STRATEGY_PARAMS.TRANSACTION_COST)
            cash -= cost
            shares = buyShares
            lastBuyPrice = currentPrice // 记录买入价格
            trades.push({ type: 'buy', date: currentDate, price: currentPrice, shares: buyShares, cash })
          }

          // 卖出信号：从前一日 <=阈值 变为当日 >阈值（进入贪婪区）
          if (prevFG <= SELL_THRESHOLD && currentFG > SELL_THRESHOLD && shares > 0) {
            const sellValue = shares * currentPrice * (1 - STRATEGY_PARAMS.TRANSACTION_COST)
            const returnRate = (currentPrice - lastBuyPrice) / lastBuyPrice
            cash += sellValue
            trades.push({
              type: 'sell',
              date: currentDate,
              price: currentPrice,
              shares: shares,
              cash,
              returnRate: returnRate,
            })
            shares = 0
            lastBuyPrice = 0
          }

          positionHistory.push({
            date: currentDate,
            price: currentPrice,
            cash: cash,
            shares: shares,
            totalValue: cash + shares * currentPrice,
          })
        }

        // 计算结果
        const finalValue = cash + shares * (data[data.length - 1]?.price || 0)
        const returnRate = (finalValue - STRATEGY_PARAMS.INITIAL_CASH) / STRATEGY_PARAMS.INITIAL_CASH

        // 计算胜率
        let winCount = 0
        for (let i = 1; i < trades.length; i += 2) {
          const buyTrade = trades[i - 1]
          const sellTrade = trades[i]
          if (sellTrade.price > buyTrade.price) {
            winCount++
          }
        }
        const winRate = trades.length >= 2 ? winCount / (trades.length / 2) : 0

        // 计算最大回撤
        let maxDrawdown = 0
        let peakValue = STRATEGY_PARAMS.INITIAL_CASH
        for (const position of positionHistory) {
          const currentValue = position.totalValue
          if (currentValue > peakValue) {
            peakValue = currentValue
          }
          const drawdown = (peakValue - currentValue) / peakValue
          if (drawdown > maxDrawdown) {
            maxDrawdown = drawdown
          }
        }

        // 检查最后一次交易并发送通知
        if (trades.length > 0) {
          const lastTrade = trades[trades.length - 1]
          if (lastTrade.type === 'buy') {
            // 发送微信通知
            NotificationService.addNotification(
              `${index.name}(${index.symbol}) 买入信号\n策略类型：${strategyName}\n日期：${lastTrade.date}\n价格：¥${lastTrade.price.toFixed(2)}\n买入数量：${lastTrade.shares}股\n剩余资金：¥${lastTrade.cash.toFixed(2)}`,
              'buy',
              index.symbol,
            )
          } else if (lastTrade.type === 'sell') {
            // 发送微信通知
            NotificationService.addNotification(
              `${index.name}(${index.symbol}) 卖出信号\n策略类型：${strategyName}\n日期：${lastTrade.date}\n价格：¥${lastTrade.price.toFixed(2)}\n卖出数量：${lastTrade.shares}股\n总资金：¥${lastTrade.cash.toFixed(2)}`,
              'sell',
              index.symbol,
            )
          }
        }

        return {

      // 检查是否在交易时间内
      function isTradingTime() {
        const now = new Date()
        const hours = now.getHours()
        const minutes = now.getMinutes()
        const day = now.getDay()
        const time = hours * 60 + minutes // 转换为分钟数，方便比较

        // 周一到周五
        if (day < 1 || day > 6) {
          return false
        }

        // 上午交易时间：9:15-11:30
        const morningStart = 9 * 60 + 15 // 9:15
        const morningEnd = 11 * 60 + 30 // 11:30

        // 下午交易时间：13:00-15:00
        const afternoonStart = 13 * 60 + 0 // 13:00
        const afternoonEnd = 19 * 60 + 0 // 15:00

        return (time >= morningStart && time <= morningEnd) || (time >= afternoonStart && time <= afternoonEnd)
      }

      // 获取下一次刷新时间（下一个5分钟的后一分钟）
      function getNextRefreshTime() {
        const now = new Date()
        const next = new Date(now)
        next.setMinutes(Math.ceil(now.getMinutes() / 5) * 5 + 1, 0, 0)
        return next
      }
