      .trades-table td {

      .buy-row {
        background-color: rgba(40, 167, 69, 0.1);

      .sell-row {
        background-color: rgba(220, 53, 69, 0.1);
      }

      .footer {
        text-align: center;
        margin-top: 40px;

      }

      .loading {
        text-align: center;
        padding: 50px;
        font-size: 18px;
        color: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>M20策略对比分析</h1>
      <p style="text-align: center; color: #7f8c8d">
        生成时间:
        <span id="current-time"></span>
      </p>

      <div class="overview">
        <h2>策略说明</h2>
        <ul>
          <li>
            <strong>数据来源：</strong>
            1分钟K线（获取1200条，聚合为5分钟数据）
          </li>
          <li>
            <strong>1分钟M20：</strong>
            20个1分钟（20分钟均线）
          </li>
          <li>
            <strong>5分钟M20：</strong>
            20个5分钟（100分钟均线）
          </li>
          <li>
            <strong>买入条件：</strong>
            价格站上M20均线
          </li>
          <li>
            <strong>卖出条件：</strong>
            价格跌破M20均线
          </li>
          <li>
            <strong>初始资金：</strong>
            100,000元
          </li>
          <li>
            <strong>回测周期：</strong>
            最近240个1分钟（4小时）/ 48个5分钟（4小时）
          </li>
          <li>
            回测期间：
            <span id="backtest-period"></span>
          </li>
          <li>
            通知权限：
            <button
              id="request-notification"
              style="
                padding: 5px 10px;
                background-color: #3498db;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              ">
              请求通知权限
            </button>
          </li>
        </ul>
      </div>

      <div class="table-container">
        <h2>回测结果对比</h2>
        <table id="backtest-results">
          <thead>
            <tr>
              <th>指数</th>
              <th>策略类型</th>
              <th>初始资金</th>
              <th>最终价值</th>
              <th>收益率</th>
              <th>交易次数</th>
            </tr>
          </thead>
          <tbody>
            <!-- 结果将通过JavaScript动态填充 -->
          </tbody>
        </table>
      </div>

      <!-- 图表和交易记录将通过JavaScript动态生成 -->

      <div class="footer">
        <p>M20策略对比分析 © 2026</p>
        <p>页面将每5分钟自动刷新一次</p>
      </div>
    </div>

    <script>
      // 指数配置
      const INDICES = [
        { symbol: 'sh000001', name: '上证指数', isT0: true },
        { symbol: 'sh510880', name: '红利',isT0: true },
        // { symbol: 'sh518680', name: '金', isT0: true },
      ]

      // 记录每个指数上一次的通知类型
      const lastNotificationType = new Map()

      // 存储图表实例，用于销毁旧图表
      const chartInstances = {}

      const STRATEGY_PARAMS = {
        INITIAL_CASH: 100000,
        M20_PERIOD: 20,
      }

      // 数据获取函数 - 获取1分钟数据
      async function fetch1MinData(symbol) {
        try {
          const url = `/api/cn/api/json_v2.php/CN_MarketDataService.getKLineData?symbol=${symbol}&scale=1&datalen=600`
          const response = await fetch(url)

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`)
          }

          const data = await response.json()
          let oneMinData = data.map((item) => ({
            time: item.day,
            price: parseFloat(item.close),
          }))

          oneMinData.sort((a, b) => new Date(a.time) - new Date(b.time))
          oneMinData = filterTradingHours(oneMinData)

          return oneMinData
        } catch (error) {
          console.error(`获取${symbol}1分钟数据失败:`, error)
          return generateMockData(symbol, 1)
        }
      }

      // 数据获取函数 - 获取5分钟数据
      async function fetch5MinData(symbol) {
        try {
          const url = `/api/cn/api/json_v2.php/CN_MarketDataService.getKLineData?symbol=${symbol}&scale=5&datalen=240`
          const response = await fetch(url)

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`)
          }

          const data = await response.json()
          let fiveMinData = data.map((item) => ({
            time: item.day,
            price: parseFloat(item.close),
          }))

          fiveMinData.sort((a, b) => new Date(a.time) - new Date(b.time))
          fiveMinData = filterTradingHours(fiveMinData)

          return fiveMinData
        } catch (error) {
          console.error(`获取${symbol}5分钟数据失败:`, error)
          return generateMockData(symbol, 5)
        }
      }

      // 过滤非交易时间数据
      function filterTradingHours(data) {
        return data.filter((item) => {
          const time = new Date(item.time)
          const hour = time.getHours()
          const minute = time.getMinutes()

          // A股交易时间：上午9:30-11:30，下午13:00-15:00
          const isMorningTrading = (hour === 9 && minute >= 30) || hour === 10 || (hour === 11 && minute <= 30)
          const isAfternoonTrading = hour >= 13 && hour < 15

          return isMorningTrading || isAfternoonTrading
        })
      }

      // 将1分钟数据聚合为5分钟数据
      function aggregateTo5Min(oneMinData) {
        const fiveMinData = []
        let currentGroup = []
        let last5MinTime = null

        for (const item of oneMinData) {
          const time = new Date(item.time)
          const hour = time.getHours()
          const minutes = time.getMinutes()

          // 只处理交易时间内的数据
          if (!isInTradingHours(hour, minutes)) {
            continue
          }

          const groupIndex = Math.floor(minutes / 5)
          const groupTime = new Date(time)
          groupTime.setMinutes(groupIndex * 5, 0, 0)
          const groupTimeStr = groupTime.toISOString().replace('T', ' ').substring(0, 19)

          if (last5MinTime !== groupTimeStr) {
            // 新的5分钟组
            if (currentGroup.length > 0) {
              // 计算上一组的收盘价（使用最后一个数据点的价格）
              fiveMinData.push({
                time: last5MinTime,
                price: currentGroup[currentGroup.length - 1].price,
              })
            }
            currentGroup = [item]
            last5MinTime = groupTimeStr
          } else {
            currentGroup.push(item)
          }
        }

        // 添加最后一组
        if (currentGroup.length > 0) {
          fiveMinData.push({
            time: last5MinTime,
            price: currentGroup[currentGroup.length - 1].price,
          })
        }

        return fiveMinData
      }

      // 检查是否在交易时间内
      function isInTradingHours(hour, minute) {
        // A股交易时间：上午9:30-11:30，下午13:00-15:00
        const isMorningTrading = (hour === 9 && minute >= 30) || hour === 10 || (hour === 11 && minute <= 30)
        const isAfternoonTrading = hour >= 13 && hour < 15
        return isMorningTrading || isAfternoonTrading
      }

      // 生成模拟数据，用于本地测试
      function generateMockData(symbol, period = 1) {
        const mockData = []
        const now = new Date()
        let basePrice = symbol === 'sh000001' ? 4000 : 4600
        const interval = period === 5 ? 5 : 1
        const count = period === 5 ? 240 : 600

        for (let i = count - 1; i >= 0; i--) {
          const time = new Date(now.getTime() - i * interval * 60 * 1000)
          const hour = time.getHours()
          const minute = time.getMinutes()

          // 只在交易时间内生成数据（上午9:30-11:30，下午13:00-15:00）
          const isMorning = (hour === 9 && minute >= 30) || hour === 10 || (hour === 11 && minute <= 30)
          const isAfternoon = hour >= 13 && hour < 15
          if (!isMorning && !isAfternoon) {
            continue
          }

          const timeStr = time.toISOString().replace('T', ' ').substring(0, 19)
          const change = (Math.random() - 0.5) * (period === 5 ? 10 : 5)
          basePrice += change
          mockData.push({
            time: timeStr,
            price: parseFloat(basePrice.toFixed(2)),
          })
        }

        mockData.sort((a, b) => new Date(a.time) - new Date(b.time))

        return mockData
      }

      // 计算M20
      function calculateM20(data) {
        const m20Data = []
        for (let i = 19; i < data.length; i++) {
          const sum = data.slice(i - 19, i + 1).reduce((acc, item) => acc + item.price, 0)
          m20Data.push(sum / 20)
        }
        return m20Data
      }

      // 回测策略
      async function backtestM20Strategy(minuteData, symbol, name, isT0 = false) {
        console.log(`正在回测 ${name} (${symbol})...`)

        // 计算M20
        const m20Data = calculateM20(minuteData)

        // 回测参数
        let cash = STRATEGY_PARAMS.INITIAL_CASH
        let shares = 0
        let totalValue = cash
        let trades = []
        let positionHistory = []
        let lastAboveM20 = false
        let sharePurchaseDates = [] // 记录每一股的买入日期，用于T+1
        let sellSignal = false // 记录卖出信号，用于T+1
        let hasSentSellNotification = false // 标记是否已经发送过卖出通知

        // 模拟交易
        for (let i = 19; i < minuteData.length; i++) {
          const data = minuteData[i]
          const time = data.time
          const price = data.price
          const m20Value = m20Data[i - 19]

          const currentAboveM20 = price > m20Value

          // 检查是否是第二天开盘时间（9:35），如果有卖出信号，执行卖出操作
          const isMarketOpen = time.includes(' 09:35:00')
          if (isMarketOpen && sellSignal && shares > 0) {
            // 检查当前是否仍然跌破M20
            if (!currentAboveM20) {
              // T0产品直接卖出，不需要检查T+1条件
              if (isT0) {
                const sellShares = shares
                cash += sellShares * price
                shares = 0
                sharePurchaseDates = [] // 清空买入日期记录
                const newTotalValue = cash + shares * price
                trades.push({ time, type: 'sell', price, shares: sellShares, cash, totalValue: newTotalValue })
                console.log(`  ${time} 卖出 ${price} (T0，开盘执行)`)
                sellSignal = false // 清除卖出信号
              } else {
                // 检查是否满足T+1条件（只看日期，不看时间）
                const sellDate = new Date(time)
                const sellDateStr = sellDate.toISOString().split('T')[0]
                let sellableShares = 0

                // 计算可卖出的股数（满足T+1条件）
                for (let j = 0; j < sharePurchaseDates.length; j++) {
                  const buyDateStr = sharePurchaseDates[j]
                  if (buyDateStr < sellDateStr) {
                    sellableShares++
                  }
                }

                if (sellableShares > 0) {
                  const sellShares = Math.min(sellableShares, shares) // 卖出可卖出的股数
                  cash += sellShares * price
                  shares -= sellShares
                  // 移除已卖出的股数的买入日期记录
                  sharePurchaseDates.splice(0, sellShares)
                  const newTotalValue = cash + shares * price
                  trades.push({ time, type: 'sell', price, shares: sellShares, cash, totalValue: newTotalValue })
                  console.log(`  ${time} 卖出 ${price} (T+1满足，开盘执行)`)

                  sellSignal = false // 清除卖出信号
                }
              }
            } else {
              // 当前已经站上M20，清除卖出信号
              console.log(`  ${time} 已站上M20，清除卖出信号`)
              sellSignal = false // 清除卖出信号
            }
          }

          // 交易信号
          if (currentAboveM20 && !lastAboveM20) {
            // 站上M20，买入
            // 如果有卖出信号，先执行卖出操作
            if (sellSignal && shares > 0) {
              // T0产品直接卖出，不需要检查T+1条件
              if (isT0) {
                const sellShares = shares
                cash += sellShares * price
                shares = 0
                sharePurchaseDates = [] // 清空买入日期记录
                const newTotalValue = cash + shares * price
                trades.push({ time, type: 'sell', price, shares: sellShares, cash, totalValue: newTotalValue })
                console.log(`  ${time} 卖出 ${price} (T0，站上M20前执行)`)

                // 发送桌面通知（只有当通知类型与上一次不同时才发送）
                const currentNotificationType = 'sell'
                const previousNotificationType = lastNotificationType.get(name)
                if (
                  'Notification' in window &&
                  Notification.permission === 'granted' &&
                  currentNotificationType !== previousNotificationType
                ) {
                  new Notification('交易通知', {
                    body: `${name} 有紧急卖出信号`,
                    icon: 'https://cdn-icons-png.flaticon.com/512/25/25211.png',
                  })
                  lastNotificationType.set(name, currentNotificationType)
                }

                sellSignal = false // 清除卖出信号
              } else {
                // 检查是否满足T+1条件（只看日期，不看时间）
                const sellDate = new Date(time)
                const sellDateStr = sellDate.toISOString().split('T')[0]
                let sellableShares = 0

                // 计算可卖出的股数（满足T+1条件）
                for (let j = 0; j < sharePurchaseDates.length; j++) {
                  const buyDateStr = sharePurchaseDates[j]
                  if (buyDateStr < sellDateStr) {
                    sellableShares++
                  }
                }

                if (sellableShares > 0) {
                  const sellShares = Math.min(sellableShares, shares) // 卖出可卖出的股数
                  cash += sellShares * price
                  shares -= sellShares
                  // 移除已卖出的股数的买入日期记录
                  sharePurchaseDates.splice(0, sellShares)
                  const newTotalValue = cash + shares * price
                  trades.push({ time, type: 'sell', price, shares: sellShares, cash, totalValue: newTotalValue })
                  console.log(`  ${time} 卖出 ${price} (T+1满足，站上M20前执行)`)

                  // 发送桌面通知（只有当通知类型与上一次不同时才发送）
                  const currentNotificationType = 'sell'
                  const previousNotificationType = lastNotificationType.get(name)
                  if (
                    'Notification' in window &&
                    Notification.permission === 'granted' &&
                    currentNotificationType !== previousNotificationType
                  ) {
                    new Notification('交易通知', {
                      body: `${name} 有紧急卖出信号`,
                      icon: 'https://cdn-icons-png.flaticon.com/512/25/25211.png',
                    })
                    lastNotificationType.set(name, currentNotificationType)
                  }

                  sellSignal = false // 清除卖出信号
                }
              }
            }

            // 买入操作
            const buyAmount = cash // 全部买入
            const buyShares = Math.floor(buyAmount / price)
            if (buyShares > 0) {
              cash -= buyShares * price
              shares += buyShares
              // 记录每一股的买入日期（只记录年月日）
              const buyDate = new Date(time)
              const buyDateStr = buyDate.toISOString().split('T')[0]
              for (let j = 0; j < buyShares; j++) {
                sharePurchaseDates.push(buyDateStr)
              }
              const newTotalValue = cash + shares * price
              trades.push({ time, type: 'buy', price, shares: buyShares, cash, totalValue: newTotalValue })
              console.log(`  ${time} 买入 ${price}`)
            }
          } else if (!currentAboveM20 && lastAboveM20 && shares > 0) {
            // 跌破M20，卖出
            // T0产品直接卖出，不需要检查T+1条件
            if (isT0) {
              const sellShares = shares
              cash += sellShares * price
              shares = 0
              sharePurchaseDates = [] // 清空买入日期记录
              const newTotalValue = cash + shares * price
              trades.push({ time, type: 'sell', price, shares: sellShares, cash, totalValue: newTotalValue })
              console.log(`  ${time} 卖出 ${price} (T0)`)
            } else {
              // 检查是否满足T+1条件（只看日期，不看时间）
              const sellDate = new Date(time)
              const sellDateStr = sellDate.toISOString().split('T')[0]
              let sellableShares = 0

              // 计算可卖出的股数（满足T+1条件）
              for (let j = 0; j < sharePurchaseDates.length; j++) {
                const buyDateStr = sharePurchaseDates[j]
                if (buyDateStr < sellDateStr) {
                  sellableShares++
                }
              }

              if (sellableShares > 0) {
                const sellShares = Math.min(sellableShares, shares) // 卖出可卖出的股数
                cash += sellShares * price
                shares -= sellShares
                // 移除已卖出的股数的买入日期记录
                sharePurchaseDates.splice(0, sellShares)
                const newTotalValue = cash + shares * price
                trades.push({ time, type: 'sell', price, shares: sellShares, cash, totalValue: newTotalValue })
                console.log(`  ${time} 卖出 ${price} (T+1满足)`)
              } else {
                console.log(`  ${time} 跌破M20，但不满足T+1条件，将在第二天开盘卖出`)
                sellSignal = true // 记录卖出信号
              }
            }
          }

          lastAboveM20 = currentAboveM20

          // 更新总价值
          totalValue = cash + shares * price
          positionHistory.push({ time, price, m20: m20Value, totalValue })
        }

        const initialCash = STRATEGY_PARAMS.INITIAL_CASH
        const finalValue = totalValue
        const returnRate = ((finalValue - initialCash) / initialCash) * 100
        const startDate = minuteData.length > 0 ? minuteData[0].time.split(' ')[0] : '-'
        const endDate = minuteData.length > 0 ? minuteData[minuteData.length - 1].time.split(' ')[0] : '-'

        console.log(`✓ ${name} 回测完成`)
        console.log(`  初始资金: ${initialCash.toFixed(2)}`)
        console.log(`  最终价值: ${finalValue.toFixed(2)}`)
        console.log(`  收益率: ${returnRate.toFixed(2)}%`)
        console.log(`  交易次数: ${trades.length}`)

        return {
          symbol,
          name,
          initialCash,
          finalValue,
          returnRate,
          trades,
          positionHistory,
          startDate,
          endDate,
        }
      }

      // 生成报告
      function generateReport(results) {
        const validResults = results.filter((r) => !r.error)

        // 更新当前时间
        const now = new Date()
        document.getElementById('current-time').textContent = now.toLocaleString()

        // 更新回测期间
        if (validResults.length > 0) {
          document.getElementById('backtest-period').textContent =
            `${validResults[0].startDate} 至 ${validResults[0].endDate}`
        }

        // 填充回测结果表格
        const tableBody = document.getElementById('backtest-results').querySelector('tbody')
        tableBody.innerHTML = ''

        validResults.forEach((r) => {
          const row = document.createElement('tr')
          row.innerHTML = `
          <td>${r.name.replace(' (1分钟)', '').replace(' (5分钟)', '')}</td>
          <td>${r.strategyType || '5分钟M20'}</td>
          <td>${r.initialCash.toFixed(2)}</td>
          <td>${r.finalValue.toFixed(2)}</td>
          <td class="${r.returnRate >= 0 ? 'red' : 'green'}">${r.returnRate.toFixed(2)}%</td>
          <td>${r.trades.length}</td>
        `
          tableBody.appendChild(row)

          // 检查最后一次交易，为每个指数发送通知
          if (r.trades.length > 0) {
            const lastTrade = r.trades[r.trades.length - 1]
            if (lastTrade.type === 'buy' || lastTrade.type === 'sell') {
              // 发送桌面通知（只有当通知类型与上一次不同时才发送）
              const currentNotificationType = lastTrade.type
              const previousNotificationType = lastNotificationType.get(r.name)
              if (
                'Notification' in window &&
                Notification.permission === 'granted' &&
                currentNotificationType !== previousNotificationType
              ) {
                const message = lastTrade.type === 'buy' ? `${r.name} 有紧急买入信号` : `${r.name} 有紧急卖出信号`
                new Notification('交易通知', {
                  body: message,
                  icon: 'https://cdn-icons-png.flaticon.com/512/25/25211.png',
                })
                lastNotificationType.set(r.name, currentNotificationType)
              }
            }
          }
        })

        // 生成图表和交易记录
        const container = document.querySelector('.container')
        const footer = document.querySelector('.footer')

        // 清除之前的图表和交易记录
        const existingCharts = container.querySelectorAll('.chart-container, .trades-container')
        existingCharts.forEach((el) => el.remove())

        // 添加新的图表和交易记录
        validResults.forEach((r) => {
          // 分时图
          const minuteChartContainer = document.createElement('div')
          minuteChartContainer.className = 'chart-container'
          // 计算当前520状态
          const latestData = r.positionHistory[r.positionHistory.length - 1]
          const currentPrice = latestData.price
          const currentM20 = latestData.m20
          const isAboveM20 = currentPrice > currentM20
          const m20Status = isAboveM20 ? '站上' : '跌破'
          const m20StatusClass = isAboveM20 ? 'status-up' : 'status-down'

          minuteChartContainer.innerHTML = `
          <h3>${r.name} 分时图</h3>
          <div class="status-container">
            <div class="status-item">
              <span class="status-label">当前520状态:</span>
              <span class="status-value ${m20StatusClass}">${m20Status}</span>
            </div>
            <div class="status-item">
              <span class="status-label">当前价格:</span>
              <span class="status-value">${currentPrice.toFixed(2)}</span>
            </div>
            <div class="status-item">
              <span class="status-label">520值:</span>
              <span class="status-value">${currentM20.toFixed(2)}</span>
            </div>
          </div>
          <div class="chart-wrapper">
            <canvas id="minute-chart-${r.symbol}-${r.strategyType}"></canvas>
          </div>
        `
          container.insertBefore(minuteChartContainer, footer)

          // 交易记录
          const tradesContainer = document.createElement('div')
          tradesContainer.className = 'trades-container'
          tradesContainer.innerHTML = `
          <h3>${r.name} 交易记录</h3>
          <div class="table-wrapper">
            <table class="trades-table">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>类型</th>
                  <th>价格</th>
                  <th>股数</th>
                  <th>剩余现金</th>
                  <th>总价值</th>
                </tr>
              </thead>
              <tbody>
                ${r.trades
                  .map(
                    (trade) => `
                <tr class="${trade.type === 'buy' ? 'buy-row' : 'sell-row'}">
                  <td>${trade.time}</td>
                  <td>${trade.type === 'buy' ? '买入' : '卖出'}</td>
                  <td>${trade.price.toFixed(2)}</td>
                  <td>${trade.shares}</td>
                  <td>${trade.cash.toFixed(2)}</td>
                  <td>${trade.totalValue.toFixed(2)}</td>
                </tr>
                `,
                  )
                  .join('')}
              </tbody>
            </table>
          </div>
        `
          container.insertBefore(tradesContainer, footer)

          // 绘制分时图
          const chartId = `minute-chart-${r.symbol}-${r.strategyType}`
          const minuteCtx = document.getElementById(chartId).getContext('2d')

          // 销毁旧图表
          if (chartInstances[chartId]) {
            chartInstances[chartId].destroy()
            chartInstances[chartId] = null
          }

          // 准备买卖点数据
          const buyPoints = []
          const sellPoints = []
          const timeMap = new Map()
          r.positionHistory.forEach((p, i) => timeMap.set(p.time, i))

          r.trades.forEach((trade) => {
            if (timeMap.has(trade.time)) {
              const index = timeMap.get(trade.time)
              if (trade.type === 'buy') {
                buyPoints.push({ x: index, y: trade.price })
              } else {
                sellPoints.push({ x: index, y: trade.price })
              }
            }
          })

          chartInstances[chartId] = new Chart(minuteCtx, {
            type: 'line',
            data: {
              labels: r.positionHistory.map((p) => p.time),
              datasets: [
                {
                  label: '价格',
                  data: r.positionHistory.map((p) => p.price),
                  borderColor: '#e74c3c',
                  backgroundColor: 'transparent',
                  borderWidth: 2,
                  fill: false,
                  tension: 0.1,
                  pointRadius: 0,
                },
                {
                  label: 'M20',
                  data: r.positionHistory.map((p) => p.m20),
                  borderColor: '#f39c12',
                  backgroundColor: 'transparent',
                  borderWidth: 1,
                  borderDash: [5, 5],
                  fill: false,
                  tension: 0.1,
                  pointRadius: 0,
                },
                {
                  label: '买入',
                  data: buyPoints,
                  type: 'line',
                  borderColor: '#27ae60',
                  backgroundColor: 'transparent',
                  borderWidth: 2,
                  pointRadius: 0,
                  pointHoverRadius: 8,
                  showLine: false,
                },
                {
                  label: '卖出',
                  data: sellPoints,
                  type: 'line',
                  borderColor: '#e74c3c',
                  backgroundColor: 'transparent',
                  borderWidth: 2,
                  pointRadius: 0,
                  pointHoverRadius: 8,
                  showLine: false,
                },
              ],
            },
            options: {
              responsive: true,
              interaction: { mode: 'index', intersect: false },
              scales: {
                y: {
                  title: {
                    display: true,
                    text: '价格',
                  },
                },
              },
              plugins: {
                tooltip: {
                  callbacks: {
                    label: function (context) {
                      let label = context.dataset.label || ''
                      if (label) {
                        label += ': '
                      }
                      if (context.dataset.type === 'scatter') {
                        label += context.parsed.y.toFixed(2)
                      } else {
                        label += context.parsed.y.toFixed(2)
                      }
                      return label
                    },
                  },
                },
                legend: {
                  position: 'top',
                },
              },
            },
          })
        })
      }

      // 主函数
      async function main() {
        console.log('M20策略对比分析系统')

        const results = []

        for (const index of INDICES) {
          try {
            // 红利指数需要同时获取1分钟和5分钟数据
           
              const oneMinData = await fetch1MinData(index.symbol)
              console.log(`✓ ${index.name} 1分钟数据：${oneMinData.length} 条`)

              // 回测1分钟策略
              const result1Min = await backtestM20Strategy(
                oneMinData,
                index.symbol,
                index.name + ' (1分钟)',
                index.isT0,
              )
              result1Min.strategyType = '1分钟M20'
              results.push(result1Min)
            

            // 所有股票都获取5分钟数据
            const fiveMinData = await fetch5MinData(index.symbol)
            console.log(`✓ ${index.name} 5分钟数据：${fiveMinData.length} 条`)

            // 回测5分钟策略
            const result5Min = await backtestM20Strategy(fiveMinData, index.symbol, index.name + ' (5分钟)', index.isT0)
            result5Min.strategyType = '5分钟M20'
            results.push(result5Min)
          } catch (error) {
            console.error(`✗ ${index.name} 回测失败: ${error.message}`)
            results.push({ ...index, error: error.message })
          }
        }

        // 生成报告
        generateReport(results)
      }

      // 页面加载时执行
      window.onload = function () {
        // 记录页面打开时间
        window.pageLoadTime = new Date().getTime()

        // 绑定通知权限请求按钮
        const requestNotificationBtn = document.getElementById('request-notification')
        if (requestNotificationBtn) {
          requestNotificationBtn.addEventListener('click', function () {
            if ('Notification' in window) {
              Notification.requestPermission().then(function (permission) {
                if (permission === 'granted') {
                  console.log('桌面通知权限已授予')
                  requestNotificationBtn.textContent = '通知权限已授予'
                  requestNotificationBtn.disabled = true
                  requestNotificationBtn.style.backgroundColor = '#27ae60'
                } else {
                  console.log('桌面通知权限被拒绝')
                  requestNotificationBtn.textContent = '通知权限被拒绝'
                  requestNotificationBtn.disabled = true
                  requestNotificationBtn.style.backgroundColor = '#e74c3c'
                }
              })
            } else {
              alert('您的浏览器不支持桌面通知')
            }
          })
        }

        main().catch(console.error)
      }

      // 判断当前时间是否在交易时间段内（9:25-11:30 和 13:00-15:00）
      function isInTradingHours() {
        const now = new Date()
        const hours = now.getHours()
        const minutes = now.getMinutes()
        const time = hours * 60 + minutes // 转换为分钟数，方便比较

        // 上午交易时间：9:25-11:30
        const morningStart = 9 * 60 + 25 // 9:25
        const morningEnd = 11 * 60 + 30 // 11:30

        // 下午交易时间：13:00-15:00
        const afternoonStart = 13 * 60 + 0 // 13:00
        const afternoonEnd = 15 * 60 + 0 // 15:00

        return (time >= morningStart && time <= morningEnd) || (time >= afternoonStart && time <= afternoonEnd)
      }

      // 计算下一个交易时间段内的5分钟区间的后一分钟
      function getNextRefreshTime() {
        const now = new Date()
        const hours = now.getHours()
        const minutes = now.getMinutes()
        const time = hours * 60 + minutes

        // 上午交易时间：9:25-11:30
        const morningStart = 9 * 60 + 25
        const morningEnd = 11 * 60 + 30

        // 下午交易时间：13:00-15:00
        const afternoonStart = 13 * 60 + 0
        const afternoonEnd = 15 * 60 + 0

        // 计算当前处于哪个5分钟区间
        const interval = Math.floor(minutes / 5)
        // 下一个5分钟区间的后一分钟
        let nextMinutes = (interval + 1) * 5 + 1
        let nextHours = hours

        // 如果下一个时间在当前时间之前，则设置为下一小时
        if (nextMinutes >= 60) {
          nextMinutes = nextMinutes % 60
          nextHours = nextHours + 1
        }

        let nextTime = new Date(now)
        nextTime.setHours(nextHours, nextMinutes, 0, 0)

        const nextTimeInMinutes = nextHours * 60 + nextMinutes

        // 如果下一个时间不在交易时间段内，则调整到下一个交易时间段
        if (nextTimeInMinutes > morningEnd && nextTimeInMinutes < afternoonStart) {
          // 在上午收盘后，下午开盘前，设置为下午13:01
          nextTime.setHours(13, 1, 0, 0)
        } else if (nextTimeInMinutes > afternoonEnd) {
          // 在下午收盘后，设置为下一个交易日的上午9:26
          nextTime.setDate(nextTime.getDate() + 1)
          nextTime.setHours(9, 26, 0, 0)
        } else if (nextTimeInMinutes < morningStart) {
          // 在上午开盘前，设置为上午9:26
          nextTime.setHours(9, 26, 0, 0)
        }

        return nextTime
      }

      // 只在交易时间段内启动定时刷新
      if (isInTradingHours()) {
        // 计算到下一个刷新时间的毫秒数
        const nextRefreshTime = getNextRefreshTime()
        const delay = nextRefreshTime.getTime() - new Date().getTime()

        console.log(`下一次刷新时间：${nextRefreshTime.toLocaleString()}`)
        console.log(`延迟：${delay} 毫秒`)

        // 先设置超时器，在到达下一个5分钟的后一分钟时执行第一次刷新
        setTimeout(function () {
          main().catch(console.error)

          // 然后设置每5分钟执行一次的定时器
          setInterval(function () {
            // 只在交易时间段内执行刷新
            if (isInTradingHours()) {
              main().catch(console.error)
            } else {
              console.log('当前不在交易时间段内，跳过刷新')
            }
          }, 300000)
        }, delay)
      } else {
        console.log('当前不在交易时间段内（9:25-11:30 或 13:00-15:00），不启动定时刷新')
      }
    </script>
  </body>
</html>
